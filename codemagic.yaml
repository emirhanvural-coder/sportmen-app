workflows:
  sportmen-ios-only:
    name: Sportmen iOS Build
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Force Rebuild iOS Configuration
        # Windows'taki dosyaları bozmadan, Mac üzerinde iOS klasörünü sıfırlıyoruz
        script: |
          rm -rf ios
          flutter create --platforms=ios .
      - name: Build iOS
        script: |
          echo $FIREBASE_SERVICE_ACCOUNT > service-account.json
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa