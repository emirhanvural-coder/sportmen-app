workflows:
  sportmen-ios-only:
    name: Sportmen iOS Build
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Clean and Rebuild iOS Environment
        script: |
          rm -rf ios
          flutter create --platforms=ios .
      - name: Build iOS
        script: |
          echo $FIREBASE_SERVICE_ACCOUNT > service-account.json
          # Workspace'i açıkça belirtiyoruz ve modülleri bağlamasını sağlıyoruz
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --workspace=ios/Runner.xcworkspace \
            --scheme=Runner
    artifacts:
      - build/ios/ipa/*.ipa