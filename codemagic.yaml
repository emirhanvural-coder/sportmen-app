workflows:
  sportmen-ios-only:
    name: Sportmen iOS Build
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
          # Flutter'ın iOS dosyalarını hazırlamasını zorunlu tutuyoruz
          flutter build ios --config-only
      - name: Build iOS
        script: |
          echo $FIREBASE_SERVICE_ACCOUNT > service-account.json
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa