workflows:
  sportmen-ios-only:
    name: Sportmen iOS Build
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Clean and Rebuild iOS Environment
        script: |
          # Mac ortamında mevcut ios klasörünü temizle ve sıfırdan oluştur
          rm -rf ios
          flutter create --platforms=ios .
      - name: Build iOS
        script: |
          echo $FIREBASE_SERVICE_ACCOUNT > service-account.json
          # iOS için derleme komutu
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa